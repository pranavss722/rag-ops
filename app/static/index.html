<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dugout — Football Intelligence Platform</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #0a0e1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 2px solid #f0c040;
    background: #0d1224;
    flex-shrink: 0;
  }
  .header-left h1 {
    font-size: 28px;
    font-weight: 900;
    color: #f0c040;
    letter-spacing: 4px;
  }
  .header-left p {
    font-size: 11px;
    color: #888;
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #4cff88;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .live-dot {
    width: 10px;
    height: 10px;
    background: #4cff88;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px #4cff88; }
    50% { opacity: 0.4; box-shadow: 0 0 12px #4cff88; }
  }

  /* LAYOUT */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: #0d1224;
    border-right: 1px solid #1a2040;
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-title {
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .chip {
    display: block;
    width: 100%;
    background: #111833;
    border: 1px solid #1a2040;
    color: #ccc;
    padding: 12px 14px;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover {
    background: #1a2548;
    border-color: #f0c040;
    color: #f0c040;
  }
  .chip-icon { margin-right: 8px; }

  /* SESSION STATS */
  .session-stats {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid #1a2040;
  }
  .session-stats .sidebar-title { margin-bottom: 8px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #666;
    padding: 3px 0;
  }
  .stat-row span:last-child { color: #f0c040; }

  /* CHAT AREA */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    font-size: 18px;
    letter-spacing: 3px;
    font-weight: bold;
  }

  /* MESSAGES */
  .msg {
    max-width: 75%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg-user {
    align-self: flex-end;
  }
  .msg-user .msg-label {
    text-align: right;
    font-size: 10px;
    color: #f0c040;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .msg-user .msg-bubble {
    background: #f0c040;
    color: #0a0e1a;
    padding: 12px 16px;
    border-radius: 10px 10px 2px 10px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg-ai {
    align-self: flex-start;
  }
  .msg-ai .msg-label {
    font-size: 10px;
    color: #f0c040;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .msg-ai .msg-bubble {
    background: #111833;
    border-left: 3px solid #f0c040;
    padding: 14px 18px;
    border-radius: 2px 10px 10px 10px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* STATS BAR */
  .msg-stats {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    font-size: 10px;
    color: #555;
    letter-spacing: 1px;
  }

  /* TYPING INDICATOR */
  .typing {
    align-self: flex-start;
    color: #f0c040;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 8px 0;
    display: none;
  }
  .typing.active { display: block; }
  .typing-dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* INPUT */
  .input-bar {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    border-top: 1px solid #1a2040;
    background: #0d1224;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1;
    background: #111833;
    border: 1px solid #1a2040;
    color: #e0e0e0;
    padding: 12px 16px;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-bar input:focus { border-color: #f0c040; }
  .input-bar input::placeholder { color: #444; }
  .input-bar button {
    background: #f0c040;
    color: #0a0e1a;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .input-bar button:hover { background: #ffd566; }
  .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* MOBILE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .header-left h1 { font-size: 20px; }
    .msg { max-width: 90%; }
    .input-bar { padding: 12px 16px; }
    .input-bar button { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>THE DUGOUT</h1>
    <p>FOOTBALL INTELLIGENCE PLATFORM</p>
  </div>
  <div class="live-indicator">
    <div class="live-dot"></div>
    LIVE
  </div>
</header>

<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar-title">QUICK INTEL</div>
    <button class="chip" data-q="Who is the greatest footballer of all time and why?">
      <span class="chip-icon">⚽</span>PLAYERS
    </button>
    <button class="chip" data-q="Which club has the most passionate fanbase in the world?">
      <span class="chip-icon">🏟️</span>CLUBS
    </button>
    <button class="chip" data-q="What is the hardest trophy to win in world football?">
      <span class="chip-icon">🏆</span>TROPHIES
    </button>
    <button class="chip" data-q="Explain gegenpressing and which managers use it best">
      <span class="chip-icon">🧠</span>TACTICS
    </button>
    <button class="chip" data-q="Who is the greatest football manager of all time?">
      <span class="chip-icon">👔</span>MANAGERS
    </button>
    <button class="chip" data-q="Explain tiki-taka football philosophy">
      <span class="chip-icon">🗣️</span>CULTURE
    </button>

    <div class="session-stats">
      <div class="sidebar-title">SESSION STATS</div>
      <div class="stat-row"><span>QUERIES</span><span id="st-queries">0</span></div>
      <div class="stat-row"><span>AVG LATENCY</span><span id="st-latency">—</span></div>
      <div class="stat-row"><span>TOTAL COST</span><span id="st-cost">$0.00</span></div>
    </div>
  </aside>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">AWAITING YOUR QUERY, GAFFER</div>
    </div>
    <div class="typing" id="typing">
      SCOUT IS ANALYZING<span class="typing-dots"></span>
    </div>
    <div class="input-bar">
      <input type="text" id="input" placeholder="> ASK THE SCOUT ANYTHING..." autocomplete="off">
      <button id="send-btn" onclick="sendMessage()">DEPLOY →</button>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const emptyState = document.getElementById('empty-state');
const sendBtn = document.getElementById('send-btn');

// Chip clicks: pre-fill and submit
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const q = chip.getAttribute('data-q');
    inputEl.value = q;
    sendMessage();
  });
});

// Enter to send
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(role, text, stats) {
  if (emptyState) emptyState.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'msg-user' : 'msg-ai');

  let statsHtml = '';
  if (stats) {
    statsHtml = `<div class="msg-stats">
      <span>⏱ ${stats.latency_ms}ms</span>
      <span>💰 $${stats.cost_usd.toFixed(6)}</span>
      <span>📄 ${stats.sources} sources</span>
    </div>`;
  }

  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'GAFFER:' : 'SCOUT:'}</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
    ${statsHtml}
  `;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  addMessage('user', text);
  sendBtn.disabled = true;
  typingEl.classList.add('active');

  try {
    const res = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text, top_k: 5 })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Request failed' }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    addMessage('ai', data.answer, {
      latency_ms: data.latency_ms,
      cost_usd: data.cost_usd,
      sources: data.sources.length
    });

    refreshStats();
  } catch (err) {
    addMessage('ai', 'ERROR: ' + err.message);
  } finally {
    sendBtn.disabled = false;
    typingEl.classList.remove('active');
  }
}

async function refreshStats() {
  try {
    const res = await fetch('/stats');
    const s = await res.json();
    document.getElementById('st-queries').textContent = s.total_queries;
    document.getElementById('st-latency').textContent =
      s.total_queries > 0 ? s.avg_latency_ms + 'ms' : '—';
    document.getElementById('st-cost').textContent = '$' + s.total_cost_usd.toFixed(4);
  } catch {}
}

// Load stats on page load
refreshStats();
</script>
</body>
</html>
